<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --error: #ef4444;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(circle at top right, #e0e7ff, transparent), 
                        radial-gradient(circle at bottom left, #f1f5f9, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 400px;
      border: 1px solid #f1f5f9;
    }

    h2 {
      margin: 0 0 0.5rem 0;
      color: var(--text-main);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .description {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .error-msg {
      background: #fef2f2;
      color: var(--error);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      border: 1px solid #fee2e2;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      border: 0;
      border-radius: 8px;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .footer-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--primary);
      text-decoration: none;
    }

    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Reset Password</h2>
    
    {% if error %}
      <div class="error-msg">
        <strong>Error:</strong> {{ error }}
      </div>
    {% endif %}

    {% if not valid %}
      <p class="description">The password reset link is invalid or expired. Please request a new link.</p>
      <a href="/forgot-password" class="footer-link">Return to login</a>
    {% else %}
      <p class="description">Please enter your new password below to secure your account.</p>
      <form method="POST" action="/reset-password">
        <input type="hidden" name="token" value="{{ token }}">
        
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required placeholder="••••••••">
        
        <button type="submit">Update Password</button>
      </form>
    {% endif %}
  </div>

</body>
</html>
